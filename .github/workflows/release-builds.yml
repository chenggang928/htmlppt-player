name: Release Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos:
    name: macOS DMG
    runs-on: macos-latest
    defaults:
      run:
        working-directory: HtmlPPT-Player
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: HtmlPPT-Player/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build DMG
        run: npm run dist:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: htmlppt-player-macos
          path: HtmlPPT-Player/release/*.dmg
          if-no-files-found: error

      - name: Attach macOS asset to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: HtmlPPT-Player/release/*.dmg

  windows:
    name: Windows Installer
    runs-on: windows-latest
    defaults:
      run:
        working-directory: HtmlPPT-Player
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: HtmlPPT-Player/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: htmlppt-player-windows
          path: HtmlPPT-Player/release/*.exe
          if-no-files-found: error

      - name: Attach Windows asset to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: HtmlPPT-Player/release/*.exe
